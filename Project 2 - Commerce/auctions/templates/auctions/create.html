{% extends "auctions/layout.html" %}

{% load crispy_forms_tags %}

{% block title %}
    Create Listing
{% endblock %}

{% block body %}

    <div class="row">
        <div class="col-md-8 mx-auto">
            <h1>Create Listing</h1>
            
            <form action="{% url 'create' %}" method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-lg btn-primary">Create</button>
            </form>
        </div>
    </div>


{% endblock %}
