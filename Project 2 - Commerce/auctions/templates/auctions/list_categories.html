{% extends "auctions/layout.html" %}

{% block title %}
    Categories
{% endblock %}

{% block body %}
    <h2 class="my-4 ml-2"><b>Categories</b></h2>
    
    <div class="row g-2">
        {% for category in categories %}
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card shadow-sm mb-2 text-center">
                    <div class="card-body">
                        <a href="{% url 'category' category %}">{{ category }}</a>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12">
                <div class="alert alert-info"><b>No categories available.</b></div>
            </div>
        {% endfor %}
    </div>

{% endblock %}
